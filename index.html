<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NSPCA Longford — Shelter Operations</title>
<meta name="theme-color" content="#0f172a">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shelter Ops">
<meta name="mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--lime:#C5E86C;--slate:#0f172a;--slate2:#1e293b;--bg:#f1f5f9;--bd:#e2e8f0;--muted:#94a3b8;--sec:#64748b}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--slate);-webkit-text-size-adjust:100%;min-height:100vh}
button{font-family:inherit;cursor:pointer}
#login{position:fixed;inset:0;background:var(--slate);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:50}
#login .card{background:#fff;border-radius:18px;padding:26px 22px;width:100%;max-width:340px;text-align:center}
#login .lock{width:46px;height:46px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px}
#login h1{font-size:16px;margin:0 0 4px}#login p{font-size:12px;color:var(--sec);margin:0 0 18px}
.codewrap{position:relative}
#code{width:100%;padding:13px 42px 13px 14px;font-size:16px;border:1px solid var(--bd);border-radius:11px;text-align:center;letter-spacing:2px}
#eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:var(--muted);padding:6px}
#login button.go{width:100%;margin-top:12px;background:var(--lime);color:var(--slate);border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700}
#login .err{display:none;color:#dc2626;font-size:12px;margin-top:10px;font-weight:600}
#login .foot{color:#475569;font-size:10px;margin-top:22px}
header{background:var(--slate);padding:10px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
header .clock{color:var(--muted);font-size:11px;font-weight:500;margin-left:auto;white-space:nowrap}
header .add{background:var(--lime);color:var(--slate);border:none;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700}
header .menu{background:var(--slate2);color:#cbd5e1;border:none;border-radius:9px;width:34px;height:34px;font-size:15px}
.units{display:flex;gap:7px;overflow-x:auto;padding:12px 14px;background:#fff;border-bottom:0.5px solid var(--bd);-webkit-overflow-scrolling:touch}
.unit{flex:0 0 auto;border:0.5px solid var(--bd);background:#fff;border-radius:20px;padding:7px 13px;font-size:12px;font-weight:600;color:var(--sec);white-space:nowrap}
.unit.on{background:var(--slate);color:var(--lime);border-color:var(--slate)}
.unit .ct{opacity:0.7;font-weight:700;margin-left:4px}
.board{padding:14px;max-width:760px;margin:0 auto}
.ugroup{margin-bottom:18px}
.uhead{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--sec);margin:0 2px 9px;display:flex;justify-content:space-between;align-items:baseline}
.uhead .cap{color:var(--muted);font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.acard{background:#fff;border:0.5px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer}
.acard .ph{height:88px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:24px;position:relative}
.acard .ph img{width:100%;height:100%;object-fit:cover}
.acard .st{position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px}
.acard .slotlbl{position:absolute;top:7px;left:7px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(15,23,42,0.78);color:#fff}
.acard .bd{padding:9px 11px}
.acard .nm{font-size:14px;font-weight:700}
.acard .nt{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.acard .meta{font-size:11px;color:var(--sec);font-weight:600;margin-top:2px}
.acard .staylbl{position:absolute;bottom:7px;left:7px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(15,23,42,0.78);color:#fff}
.acard .staylbl.long{background:#f59e0b;color:#3b2500}
.frow{display:flex;gap:11px}.frow>div{flex:1;min-width:0}
.acard.out img{filter:grayscale(0.35)}.acard.out{opacity:0.94}
.slot.empty{border:1px dashed var(--bd);border-radius:14px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70px;cursor:pointer;color:var(--muted)}
.slot.empty .slotlbl{font-size:10px;font-weight:700;color:var(--sec);margin-bottom:3px}
.slot.empty .et{font-size:11px}
.subhead{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin:2px 2px 8px}
.ov{background:#fff;border:0.5px solid var(--bd);border-radius:14px;padding:13px 15px;margin-bottom:11px;cursor:pointer}
.ov .ovtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.ov .ovn{font-size:14px;font-weight:700}
.ov .ovc{font-size:12px;color:var(--sec);font-weight:600}
.bar{height:7px;border-radius:20px;background:var(--bg);overflow:hidden}
.bar>div{height:100%;border-radius:20px;background:var(--lime)}
.addfree{width:100%;background:var(--bg);border:1px dashed var(--bd);border-radius:11px;padding:11px;font-size:13px;font-weight:600;color:var(--sec);margin-bottom:11px}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:22px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.kpi{background:#fff;border:0.5px solid var(--bd);border-radius:14px;padding:13px 15px}
.kpi .v{font-size:23px;font-weight:800;color:var(--slate);line-height:1.05}
.kpi .l{font-size:11px;font-weight:600;color:var(--sec);margin-top:4px}
.kpi .sub{font-size:10px;color:var(--muted);margin-top:2px}
.dsec{margin-bottom:18px}
.dhead{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin:0 2px 9px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:6px;border:0.5px solid var(--bd);background:#fff;color:var(--sec);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600}
.chip b{font-weight:800}
.arow{display:flex;align-items:center;gap:9px;background:#fff;border:0.5px solid var(--bd);border-radius:12px;padding:10px 13px;margin-bottom:8px;cursor:pointer}
.arow .an{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arow .aw{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.badge.med{background:#fee2e2;color:#991b1b}
.badge.long{background:#f59e0b;color:#3b2500}
.searchwrap{position:relative;margin-bottom:11px}
.searchwrap input{width:100%;border:0.5px solid var(--bd);background:#fff;border-radius:11px;padding:10px 34px 10px 13px;font-size:13px;color:var(--slate);box-sizing:border-box}
.searchwrap input:focus{outline:none;border-color:var(--lime)}
.searchwrap #search-x{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;color:var(--muted);padding:4px 8px;line-height:1;cursor:pointer}
.readyrow{display:flex;align-items:center;gap:9px;margin-top:15px;font-size:13px;font-weight:600;color:var(--slate);cursor:pointer}
.readyrow input{width:18px;height:18px;accent-color:#16a34a}
.acard .readylbl{position:absolute;bottom:7px;right:7px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;background:#16a34a;color:#fff}
.acard .flags{font-size:10px;color:#16a34a;font-weight:700;margin-top:3px}
.acard .medflag{font-size:10px;font-weight:700;margin-top:3px;color:#b45309}
.acard .medflag.over{color:#991b1b}
.medrow{display:flex;align-items:flex-start;gap:8px;background:var(--bg);border-radius:10px;padding:8px 11px;margin-bottom:7px}
.medrow .medmain{flex:1;min-width:0;font-size:12px}
.medrow .medt{font-weight:700;color:var(--slate)}
.medrow .medd{color:var(--sec)}
.medrow .meddate{font-size:10px;color:var(--muted);margin-top:2px}
.meddue{font-size:10px;font-weight:700;color:#b45309;background:#fef3c7;padding:2px 7px;border-radius:6px;margin-left:4px;white-space:nowrap}
.meddue.over{color:#991b1b;background:#fee2e2}
.medx{background:none;border:none;color:var(--muted);font-size:18px;padding:0 4px;line-height:1;cursor:pointer}
.medempty{font-size:12px;color:var(--muted);padding:2px 2px 8px}
.medadd{border-top:0.5px solid var(--bd);margin-top:10px;padding-top:4px}
.medbtn{width:100%;background:var(--slate);color:#fff;border:none;border-radius:9px;padding:9px;font-size:12px;font-weight:600;cursor:pointer}
#modal{position:fixed;inset:0;background:rgba(15,23,42,0.55);display:none;align-items:flex-end;justify-content:center;z-index:40}
#modal.show{display:flex}
#modal .sheet{background:#fff;width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto}
#modal h2{font-size:16px;margin:0 0 14px}
label.lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--sec);margin:12px 0 5px}
input[type=text],select,textarea{width:100%;padding:11px 12px;font-size:15px;font-family:inherit;border:1px solid var(--bd);border-radius:10px;background:#fff;color:var(--slate)}
textarea{min-height:70px;resize:vertical}
.photo-row{display:flex;align-items:center;gap:11px;margin-top:5px}
.photo-row img{width:60px;height:60px;border-radius:11px;object-fit:cover;border:1px solid var(--bd)}
.photo-row .pick{padding:8px 13px;background:var(--bg);border:1px dashed var(--bd);border-radius:9px;font-size:12px;color:var(--sec)}
.mbtns{display:flex;gap:9px;margin-top:18px}
.mbtns button{flex:1;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:700}
.save{background:var(--lime);color:var(--slate)}
.cancel{background:var(--bg);color:var(--sec)}
.del{background:#fee2e2;color:#991b1b;flex:0 0 auto !important;padding:13px 16px !important}
.statseg{display:flex;flex-wrap:wrap;gap:6px}
.statseg button{border:1px solid var(--bd);background:#fff;border-radius:20px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--sec)}
</style></head>
<body>

<div id="login">
  <svg width="150" height="33" viewBox="0 0 232 51" fill="none" style="margin-bottom:20px"><path d="M193.211 41.5648L191.972 46.3797H178.84L180.238 41.5648C180.572 40.428 180.839 39.4917 181.575 37.1512L192.074 2.51074H213.407L224.04 37.1512C224.708 39.4249 225.043 40.2942 225.444 41.5648L227.064 46.3797H209.199L208.064 41.5648C208.064 41.5648 207.547 39.3578 207.054 37.2849H194.281C193.679 39.5586 193.478 40.3611 193.211 41.5648ZM202.373 20.0316C202.105 18.9616 201.771 18.2929 200.835 18.2929C199.831 18.2929 199.497 18.9616 199.163 20.0316L196.956 27.9226H204.513L202.373 20.0316Z" fill="#C5E86C"/><path d="M154.633 46.3797C147.745 46.3797 136.109 39.4917 136.109 24.4452C136.109 9.39871 147.277 2.51074 155.703 2.51074H179.243V18.8279H170.081C169.279 14.6148 167.272 12.2743 162.391 12.2743C156.84 12.2743 153.496 16.8217 153.496 24.4452C153.496 31.6676 156.84 36.215 161.655 36.215C165.935 36.215 168.276 33.4731 169.613 29.4607H180.647C178.574 37.9537 173.425 46.3797 164.464 46.3797H154.633Z" fill="#C5E86C"/><path d="M108.068 34.6769V46.3797H91.3496V2.51074H123.984C129.735 2.51074 134.416 7.32563 134.416 15.4173C134.416 24.7127 128.598 32.1357 118.567 32.1357H111.144C108.67 32.1357 108.068 32.6038 108.068 34.6769ZM110.342 24.8465H110.475C114.956 24.8465 117.698 22.439 117.698 17.2229C117.698 13.1436 115.558 10.4687 111.211 10.4687H110.542C108.67 10.4687 108.068 10.9368 108.068 13.0099V22.3053C108.068 24.3784 108.67 24.8465 110.342 24.8465Z" fill="#C5E86C"/><path d="M66.159 37.9537C69.7033 37.9537 71.7095 36.7499 71.7095 34.2087C71.7095 26.0502 47.0332 33.9413 47.0332 15.4842C47.0332 7.05814 53.4531 2.51074 60.8091 2.51074H84.3486V15.1498H75.12C73.582 11.9399 70.8402 10.7362 67.229 10.7362C64.4203 10.7362 62.5478 11.6055 62.5478 13.5449C62.5478 20.0985 87.826 13.0099 87.826 31.4001C87.826 41.4311 79.3331 46.3797 72.3782 46.3797H47.3007V31.5338H56.5292C58.1342 36.0812 61.7454 37.9537 66.159 37.9537Z" fill="#C5E86C"/><path d="M14.3109 26.8527V46.3797H0V2.51074H17.454L25.8131 19.0954C26.5488 20.5666 27.0837 20.7672 27.6856 20.7672C28.555 20.7672 28.8893 20.0316 28.8893 18.6941V2.51074H43.2002V46.3797H29.3574L17.5208 26.4514C16.7852 25.1808 16.3171 24.7796 15.6484 24.7796C14.6453 24.7796 14.3109 25.5152 14.3109 26.8527Z" fill="#C5E86C"/></svg>
  <div class="card">
    <div class="lock">&#128274;</div>
    <h1>Shelter Operations</h1>
    <p>Enter your access code</p>
    <div class="codewrap">
      <input id="code" type="password" inputmode="text" autocomplete="off" placeholder="Code" onkeydown="if(event.key==='Enter')doLogin()">
      <button id="eye" onclick="toggleCode()">&#128065;</button>
    </div>
    <button class="go" onclick="doLogin()">Enter &rarr;</button>
    <div class="err" id="login-err">Code not recognised. Try again.</div>
  </div>
  <div class="foot">NSPCA Longford &middot; Animal Welfare</div>
</div>

<div id="app" style="display:none">
  <header>
    <svg width="104" height="23" viewBox="0 0 232 51" fill="none"><path d="M193.211 41.5648L191.972 46.3797H178.84L180.238 41.5648C180.572 40.428 180.839 39.4917 181.575 37.1512L192.074 2.51074H213.407L224.04 37.1512C224.708 39.4249 225.043 40.2942 225.444 41.5648L227.064 46.3797H209.199L208.064 41.5648C208.064 41.5648 207.547 39.3578 207.054 37.2849H194.281C193.679 39.5586 193.478 40.3611 193.211 41.5648ZM202.373 20.0316C202.105 18.9616 201.771 18.2929 200.835 18.2929C199.831 18.2929 199.497 18.9616 199.163 20.0316L196.956 27.9226H204.513L202.373 20.0316Z" fill="#C5E86C"/><path d="M154.633 46.3797C147.745 46.3797 136.109 39.4917 136.109 24.4452C136.109 9.39871 147.277 2.51074 155.703 2.51074H179.243V18.8279H170.081C169.279 14.6148 167.272 12.2743 162.391 12.2743C156.84 12.2743 153.496 16.8217 153.496 24.4452C153.496 31.6676 156.84 36.215 161.655 36.215C165.935 36.215 168.276 33.4731 169.613 29.4607H180.647C178.574 37.9537 173.425 46.3797 164.464 46.3797H154.633Z" fill="#C5E86C"/><path d="M108.068 34.6769V46.3797H91.3496V2.51074H123.984C129.735 2.51074 134.416 7.32563 134.416 15.4173C134.416 24.7127 128.598 32.1357 118.567 32.1357H111.144C108.67 32.1357 108.068 32.6038 108.068 34.6769ZM110.342 24.8465H110.475C114.956 24.8465 117.698 22.439 117.698 17.2229C117.698 13.1436 115.558 10.4687 111.211 10.4687H110.542C108.67 10.4687 108.068 10.9368 108.068 13.0099V22.3053C108.068 24.3784 108.67 24.8465 110.342 24.8465Z" fill="#C5E86C"/><path d="M66.159 37.9537C69.7033 37.9537 71.7095 36.7499 71.7095 34.2087C71.7095 26.0502 47.0332 33.9413 47.0332 15.4842C47.0332 7.05814 53.4531 2.51074 60.8091 2.51074H84.3486V15.1498H75.12C73.582 11.9399 70.8402 10.7362 67.229 10.7362C64.4203 10.7362 62.5478 11.6055 62.5478 13.5449C62.5478 20.0985 87.826 13.0099 87.826 31.4001C87.826 41.4311 79.3331 46.3797 72.3782 46.3797H47.3007V31.5338H56.5292C58.1342 36.0812 61.7454 37.9537 66.159 37.9537Z" fill="#C5E86C"/><path d="M14.3109 26.8527V46.3797H0V2.51074H17.454L25.8131 19.0954C26.5488 20.5666 27.0837 20.7672 27.6856 20.7672C28.555 20.7672 28.8893 20.0316 28.8893 18.6941V2.51074H43.2002V46.3797H29.3574L17.5208 26.4514C16.7852 25.1808 16.3171 24.7796 15.6484 24.7796C14.6453 24.7796 14.3109 25.5152 14.3109 26.8527Z" fill="#C5E86C"/></svg>
    <span class="clock" id="clock"></span>
    <button class="add" onclick="openAdd()">+ Add</button>
    <button class="menu" onclick="logout()" title="Log out">&#9099;</button>
  </header>
  <div class="searchwrap"><input id="search" type="search" placeholder="Search animals\u2026" oninput="onSearch(this.value)" autocomplete="off"><button id="search-x" onclick="clearSearch()" style="display:none">&times;</button></div>
  <div class="units" id="units"></div>
  <div class="board" id="board"></div>
</div>

<div id="modal"><div class="sheet">
  <h2 id="m-title">Add animal</h2>
  <label class="lbl">Name</label>
  <input id="m-name" type="text" placeholder="e.g. Bella">
  <div class="frow">
    <div><label class="lbl">Type</label>
      <select id="m-species"><option value="">&mdash;</option><option>Dog</option><option>Cat</option><option>Rabbit</option><option>Guinea pig</option><option>Other small mammal</option><option>Horse/Pony</option><option>Bird</option><option>Other</option></select></div>
    <div><label class="lbl">Sex</label>
      <select id="m-sex"><option>Unknown</option><option>Male</option><option>Female</option></select></div>
  </div>
  <div class="frow">
    <div><label class="lbl">Age</label><input id="m-age" type="text" placeholder="e.g. ~2 yrs"></div>
    <div><label class="lbl">Ref</label><input id="m-ref" type="text" placeholder="ID / ref"></div>
  </div>
  <label class="lbl">Intake date</label>
  <input id="m-intake" type="date">
  <label class="lbl">Unit</label>
  <select id="m-unit" onchange="onUnitChange()"></select>
  <div id="m-slot-wrap"><label class="lbl">Slot</label><select id="m-slot"></select></div>
  <label class="lbl">Status</label>
  <div class="statseg" id="m-status"></div>
  <div class="subhead" style="margin-top:15px">Adoption &amp; medical</div>
  <div class="frow">
    <div><label class="lbl" style="margin-top:0">Neutered</label><select id="m-neutered"><option>Unknown</option><option>Yes</option><option>No</option></select></div>
    <div><label class="lbl" style="margin-top:0">Vaccinated</label><select id="m-vaccinated"><option>Unknown</option><option>Yes</option><option>No</option></select></div>
  </div>
  <label class="lbl">Microchip</label>
  <input id="m-microchip" type="text" inputmode="numeric" placeholder="Chip number">
  <label class="readyrow"><input type="checkbox" id="m-ready"> Ready to rehome</label>
  <div class="subhead" style="margin-top:15px">Medical history</div>
  <div id="m-med-list"></div>
  <div class="medadd">
    <div class="frow">
      <div><label class="lbl" style="margin-top:0">Date</label><input id="med-date" type="date"></div>
      <div><label class="lbl" style="margin-top:0">Type</label><select id="med-type"><option>Vaccination</option><option>Treatment</option><option>Medication</option><option>Parasite</option><option>Test</option><option>Vet visit</option><option>Weight</option><option>Other</option></select></div>
    </div>
    <label class="lbl">Detail</label>
    <input id="med-detail" type="text" placeholder="e.g. DHPPi 1st, Bravecto, kennel cough">
    <div class="frow">
      <div><label class="lbl" style="margin-top:0">Next due (optional)</label><input id="med-due" type="date"></div>
      <div style="display:flex;align-items:flex-end"><button type="button" class="medbtn" onclick="addMedEntry()">+ Add entry</button></div>
    </div>
  </div>
  <label class="lbl">Outcome</label>
  <div class="frow">

      var list=S.animals.filter(function(a){return a.unit===u.name&&!a.outcome;});
      html='<button class="addfree" onclick="openAdd(\''+u.name.replace(/'/g,"\\'")+'\',null)">+ Add to '+esc(u.name)+'</button>';
      html+=list.length?('<div class="grid">'+list.map(occCard).join("")+'</div>'):'<div class="empty">No animals in '+esc(u.name)+' yet.</div>';
    }else if(u.groups){
      html=u.groups.map(function(g){return '<div class="ugroup"><div class="subhead">'+esc(g.label)+' &middot; '+g.slots.filter(function(sl){return S.animals.some(function(a){return a.unit===u.name&&a.slot===sl&&!a.outcome;});}).length+'/'+g.slots.length+'</div>'+slotGrid(u.name,g.slots)+'</div>';}).join("");
    }else{
      html='<div class="ugroup"><div class="uhead"><span>'+esc(u.name)+'</span><span class="cap">'+occCount(u.name)+' / '+u.slots.length+' full</span></div>'+slotGrid(u.name,u.slots)+'</div>';
    }
  }
  board.innerHTML=html;
}
function setUnit(u){S.unit=u;if(S.q){S.q="";var si=document.getElementById("search");if(si)si.value="";var sx=document.getElementById("search-x");if(sx)sx.style.display="none";}render();}
function onSearch(v){S.q=v;document.getElementById("search-x").style.display=v?"block":"none";render();}
function clearSearch(){S.q="";document.getElementById("search").value="";document.getElementById("search-x").style.display="none";render();}

function buildStatusSeg(){document.getElementById("m-status").innerHTML=Object.keys(STATUSES).map(function(st){var on=st===S.status;var s=STATUSES[st];return '<button type="button" onclick="setStatus(\''+st.replace(/'/g,"\\'")+'\')" style="'+(on?'background:'+s.bg+';color:'+s.fg+';border-color:'+s.fg:'')+'">'+esc(st)+'</button>';}).join("");}
function setStatus(st){S.status=st;buildStatusSeg();}
function populateSlots(unitName,current){
  var sel=document.getElementById("m-slot"),wrap=document.getElementById("m-slot-wrap");
  var sl=unitSlots(unitDef(unitName));
  if(!sl){wrap.style.display="none";sel.innerHTML="";return;}
  wrap.style.display="block";
  var taken={};S.animals.forEach(function(a){if(a.unit===unitName&&a.slot&&a.id!==S.editing)taken[a.slot]=true;});
  sel.innerHTML='<option value="">— choose slot —</option>'+sl.map(function(s){var t=taken[s];return '<option value="'+esc(s)+'"'+(s===current?" selected":"")+(t?" disabled":"")+'>'+esc(s)+(t?" (occupied)":"")+'</option>';}).join("");
}
function onUnitChange(){var u=document.getElementById("m-unit").value;populateSlots(u,"");var sp=document.getElementById("m-species");if(!sp.value)sp.value=defaultSpecies(u);}
function onOutcomeChange(){var o=document.getElementById("m-outcome").value;var d=document.getElementById("m-outcome-date");if(o&&!d.value)d.value=new Date().toISOString().slice(0,10);if(!o)d.value="";}
function fillUnitSelect(selected){document.getElementById("m-unit").innerHTML=UNITS.filter(function(u){return !u.external;}).map(function(u){return '<option'+(u.name===selected?" selected":"")+'>'+esc(u.name)+'</option>';}).join("");}
function openAdd(unit,slot){
  S.editing=null;S.photo=null;S.status="Settling in";
  document.getElementById("m-title").textContent="Add animal";
  document.getElementById("m-name").value="";document.getElementById("m-notes").value="";
  var u=unit||((S.unit!=="All"&&!unitDef(S.unit).external)?S.unit:UNITS.filter(function(x){return !x.external;})[0].name);
  document.getElementById("m-species").value=defaultSpecies(u);
  document.getElementById("m-sex").value="Unknown";
  document.getElementById("m-age").value="";
  document.getElementById("m-ref").value="";
  document.getElementById("m-intake").value=new Date().toISOString().slice(0,10);
  document.getElementById("m-outcome").value="";document.getElementById("m-outcome-date").value="";
  document.getElementById("m-neutered").value="Unknown";document.getElementById("m-vaccinated").value="Unknown";document.getElementById("m-microchip").value="";document.getElementById("m-ready").checked=false;
  S.med=[];document.getElementById("med-date").value=new Date().toISOString().slice(0,10);renderMed();
  fillUnitSelect(u);populateSlots(u,slot||"");
  document.getElementById("m-del").style.display="none";
  renderPhoto();buildStatusSeg();document.getElementById("modal").classList.add("show");
}
function openEdit(id){
  var a=S.animals.find(function(x){return x.id===id;});if(!a)return;
  S.editing=id;S.photo=a.photo||null;S.status=a.status||"Settling in";
  document.getElementById("m-title").textContent="Edit animal";
  document.getElementById("m-name").value=a.name||"";document.getElementById("m-notes").value=a.notes||"";
  document.getElementById("m-species").value=a.species||"";
  document.getElementById("m-sex").value=a.sex||"Unknown";
  document.getElementById("m-age").value=a.age||"";
  document.getElementById("m-ref").value=a.ref||"";
  document.getElementById("m-intake").value=a.intake_date||"";
  document.getElementById("m-outcome").value=a.outcome||"";document.getElementById("m-outcome-date").value=a.outcome_date||"";
  document.getElementById("m-neutered").value=a.neutered||"Unknown";document.getElementById("m-vaccinated").value=a.vaccinated||"Unknown";document.getElementById("m-microchip").value=a.microchip||"";document.getElementById("m-ready").checked=!!a.ready;
  S.med=Array.isArray(a.medical)?a.medical.slice():[];document.getElementById("med-date").value=new Date().toISOString().slice(0,10);renderMed();
  fillUnitSelect(a.unit);populateSlots(a.unit,a.slot||"");
  document.getElementById("m-del").style.display=(CURRENT&&CURRENT.role!=="staff")?"block":"none";
  renderPhoto();buildStatusSeg();document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show");}
function renderPhoto(){var img=document.getElementById("m-photo-img"),rm=document.getElementById("m-photo-rm"),lab=document.getElementById("m-photo-label");if(S.photo){img.src=S.photo;img.style.display="block";rm.style.display="block";lab.textContent="Change photo";}else{img.style.display="none";rm.style.display="none";lab.textContent="Add photo";}}
function clearPhoto(){S.photo=null;renderPhoto();}
function onPhoto(inp){var f=inp.files&&inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){var im=new Image();im.onload=function(){var max=520,w=im.width,h=im.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(im,0,0,w,h);S.photo=c.toDataURL("image/jpeg",0.78);renderPhoto();};im.src=e.target.result;};r.readAsDataURL(f);}

function tick(){var el=document.getElementById("clock");if(!el)return;var n=new Date(),d=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];var h=n.getHours(),mi=n.getMinutes();el.textContent=d[n.getDay()]+" "+n.getDate()+" "+m[n.getMonth()]+" \u00b7 "+(h<10?"0"+h:h)+":"+(mi<10?"0"+mi:mi);}
setInterval(tick,30000);
setInterval(function(){if(CURRENT&&!document.getElementById("modal").classList.contains("show"))load();},60000);
(function(){try{var saved=localStorage.getItem("nspca-occ-user");if(saved){CURRENT=JSON.parse(saved);showApp();}}catch(e){}tick();})();
</script>
</body></html>
